name: 띠별운세 자동발행 (카드뉴스 + 릴스 · 새벽)

on:
  schedule:
    # 2026-07-21: KST 00:02 → 21:00 으로 이동. 한밝님이 쓰레드를 켜고 있는 저녁 시간대에
    # 발행해야 노출이 잘 됨. 재료(카드+영상)는 전날 18:00 로컬 파이프라인이 이미 push 해둠 →
    # 당일 21시엔 그날치가 이미 존재. GitHub Actions cron 지연 감안 21~22시 실행.
    # (UTC 12:00 = KST 21:00 당일 — TZ=Asia/Seoul 로 날짜를 뽑으므로 날짜 경계 문제 없음)
    - cron: '0 12 * * *'    # KST 21:00
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 폰트·ffmpeg 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-color-emoji ffmpeg

      - name: 의존성 설치
        run: |
          pip install requests playwright edge-tts
          python -m playwright install --with-deps chromium

      # 2026-07-17: 집 PC 새벽 파이프라인이 Topview GPT Image 2 카드 5장 + 타입캐스트
      # 쇼츠를 미리 커밋해둠 → 있으면 그대로 발행(레거시 생성 건너뜀), 없으면(PC 꺼짐·
      # 생성 실패) 기존 HTML 카드 + Edge TTS 릴스로 폴백 — 발행은 어떤 경우에도 나간다.
      - name: 카드 생성 (Topview 커밋분 있으면 건너뜀)
        run: |
          TODAY=$(TZ=Asia/Seoul date +%F)
          N=$(ls cards/$TODAY/card_*.png 2>/dev/null | wc -l)
          if [ "$N" -ge 5 ]; then
            echo "Topview 카드 ${N}장 존재 — 레거시 생성 건너뜀"
          else
            python zodiac_cardnews.py generate
          fi

      - name: 릴스 영상 생성 (커밋분 있으면 건너뜀)
        run: |
          TODAY=$(TZ=Asia/Seoul date +%F)
          if [ -s "reels/${TODAY}_tts.mp4" ]; then
            echo "쇼츠 영상 존재 — 레거시 릴스 생성 건너뜀"
          else
            python zodiac_reels.py generate
          fi

      - name: 커밋 (카드+릴스 public raw 호스팅)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards/ reels/
          git commit -m "cards+reel $(TZ=Asia/Seoul date +%F)" || echo "변경 없음"
          git push

      - name: raw URL 전파 대기
        run: sleep 30

      - name: 스레드 카드뉴스 캐러셀 발행
        continue-on-error: true
        run: python zodiac_cardnews.py publish

      - name: 스레드 릴스 영상 발행
        continue-on-error: true
        run: python zodiac_reels.py publish

      # [2026-07-21] 인스타 계정 제재로 정지 → 발행 중단(주석 처리). 복구 시 주석 해제.
      # - name: 인스타 카드뉴스 캐러셀 발행
      #   continue-on-error: true
      #   run: python zodiac_instagram.py carousel
      #
      # - name: 인스타 릴스 영상 발행
      #   continue-on-error: true
      #   run: python zodiac_instagram.py reel
